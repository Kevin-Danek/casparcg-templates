<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Ban Overlay</title>
    <script src="./assets/gsap.min.js"></script>
    <link rel="stylesheet" href="assets/output.css" />
    <script src="./match_banning.js"></script>

    <script>
        const POOL = {
            "de_anubis": {
                map: "Anubis",
                image: "./assets/maps/de_anubis.png"
            },
            "de_overpass": {
                map: "Overpass",
                image: "./assets/maps/de_overpass.png"
            },
            "de_inferno": {
                map: "Inferno",
                image: "./assets/maps/de_inferno.png"
            },
            "de_mirage": {
                map: "Mirage",
                image: "./assets/maps/de_mirage.png"
            },
            "de_dust2": {
                map: "Dust II",
                image: "./assets/maps/de_dust2.png"
            },
            "de_nuke": {
                map: "Nuke",
                image: "./assets/maps/de_nuke.png"
            },
            "de_ancient": {
                map: "Ancient",
                image: "./assets/maps/de_ancient.png"
            },
            "de_train": {
                map: "Train",
                image: "./assets/maps/de_train.png"
            },
            "de_vertigo": {
                map: "Vertigo",
                image: "./assets/maps/de_vertigo.png"
            },
            "de_warden": {
                map: "Warden",
                image: "./assets/maps/de_warden.png"
            },
            "de_stronghold": {
                map: "Stronghold",
                image: "./assets/maps/de_stronghold.png"
            },
            "cs_alpine": {
                map: "Alpine",
                image: "./assets/maps/cs_alpine.png"
            },
            "cs_office": {
                map: "Office",
                image: "./assets/maps/cs_office.png"
            },
            "cs_italy": {
                map: "Italy",
                image: "./assets/maps/cs_italy.png"
            }
        }

        const mapPoolApp = new MapPoolApp('map-pool', POOL);
        const headerApp = new MatchHeader('match-header');
        
        // Načteme mapy do DOMu hned, ale schované (opacity-0)
        window.addEventListener('DOMContentLoaded', () => {
            mapPoolApp.init();
        });
        
    let isAwaitingPlay = true;

    function update(raw) {
        if (raw.match) {
            headerApp.render(raw.match);
        }

        if (raw.veto) {
            mapPoolApp.updateState(raw.veto);
        }
    }

    function play() {
        if (!isAwaitingPlay) return;
        
        const masterTl = gsap.timeline();
        
        masterTl.add(headerApp.animateIn());
        masterTl.add(mapPoolApp.animateIn(), "-=0.4"); // Mapy začnou o něco dříve (overlap)
        
        isAwaitingPlay = false;
    }

    function stop() {
        gsap.to(["#match-header", ".map-card"], {
            opacity: 0,
            y: 30,
            duration: 0.5,
            stagger: 0.02,
            ease: "power3.in",
            onComplete: () => { isAwaitingPlay = true; }
        });
    }
    </script>
</head>

<body class="w-screen h-screen overflow-hidden px-16 py-12 flex flex-col bg-primary text-primary-foreground">

    <div id="match-header" class="h-2/5">
    </div>

    <div id="map-pool" class="grid grid-cols-7 grid-rows-2 gap-2 h-3/5">
    </div>
</body>

</html>
